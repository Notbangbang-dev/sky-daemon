name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p dist

      - name: Build sky-daemon (linux/amd64)
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: x86_64-unknown-linux-gnu
          args: --release -p sky-daemon
      - run: cp target/x86_64-unknown-linux-gnu/release/sky-daemon dist/sky-daemon-linux-amd64

      - name: Build sky-daemon (linux/arm64)
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: aarch64-unknown-linux-gnu
          args: --release -p sky-daemon
      - run: cp target/aarch64-unknown-linux-gnu/release/sky-daemon dist/sky-daemon-linux-arm64

      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
